<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEEK 2</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    height: 100vh;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    cursor: none;
}
/* 🌌 星空 */
#stars {
    position: fixed;
    width: 200%;
    height: 200%;
    top: 0;
    left: 0;
    z-index: 0;
    pointer-events: none;
}
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
}
/* 🌟 光标 */
.cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 8px white, 0 0 16px white;
    z-index: 1000;
}
/* ✨ 拖尾 */
.trail {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    background: white;
    z-index: 999;
}
/* 🃏 卡片 */
.card {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.4s;
    transform-origin: center;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
    background: #111;
    border: 2px solid rgba(255,255,255,0.5);
}
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.card:hover {
    transform: scale(1.15) translateY(-10px) !important;
    z-index: 10;
}
/* 🖼️ 展示层 */
.show-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: none;
    justify-content: center;
    align-items: center;
}
.show-content {
    display: flex;
    gap: 40px;
}
.show-img {
    width: 400px;
    height: 400px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 30px white;
}
.light-text {
    width: 400px;
    line-height: 1.8;
    text-shadow: 0 0 8px white;
}
/* 🌟 新增：HOME 按钮 与第一个代码同款 */
.home-btn {
    position: fixed;
    top: 75%; /* 画面下方1/4位置（75%是垂直方向从顶部到按钮中心，正好是下1/4） */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    color: black;
    cursor: none;
    box-shadow:
        0 0 10px white,
        0 0 20px rgba(255,255,255,0.7),
        0 0 40px rgba(255,255,255,0.4);
    z-index: 500;
}
.home-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
}
</style>
</head>
<body>
<div id="stars"></div>
<!-- 卡片 -->
<div class="card" data-text="I designed 8 different web pages, including a 'Homemade Map Simulator', a 'Cloth Simulator', a 'Jigsaw Puzzle' and many other interesting things I thought of.">
    <img src="8.JPG">
</div>
<div class="card" data-text="This was my first time 'writing' code. A string of basic code structures was made up of many very unfamiliar cards. I was literally learning as I went, and I was extremely panicked. I wanted to go home...">
    <img src="CARDS.JPG">
</div>
<div class="card" data-text="I conceived the main interface of a small game, and I hoped to integrate 3D elements. The inspiration came from the pandemic period. Green viruses, maybe bacteria, spin by themselves on the screen, which is eye-catching.">
    <img src="SKETCH.JPG">
</div>
<div class="card" data-text="A very simple sketch of a small level, where the immune system fights against viruses. At least I think it's very interesting.">
    <img src="SKETCH2.JPG">
</div>
<!-- 展示 -->
<div class="show-layer" id="showLayer">
    <div class="show-content" id="showContent">
        <img class="show-img" id="showImg">
        <p class="light-text" id="showText"></p>
    </div>
</div>
<!-- 光标 -->
<div class="cursor" id="cursor"></div>
<!-- 新增：HOME按钮HTML 与第一个代码同款 -->
<div class="home-btn" onclick="goHome()">H</div>

<script>
/* 🌌 星空生成 */
const stars = document.getElementById("stars");
for (let i = 0; i < 200; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 200 + "%";
    s.style.top = Math.random() * 200 + "%";
    stars.appendChild(s);
}
/* 🪐 星空视差（参考你的代码） */
let mx = 0, my = 0;
let cx = 0, cy = 0;
document.addEventListener("mousemove", e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 50;
    my = (e.clientY / window.innerHeight - 0.5) * 50;
});
function animateStars() {
    cx += (mx - cx) * 0.05;
    cy += (my - cy) * 0.05;
    stars.style.transform = `translate(${cx * -0.5}px, ${cy * -0.5}px)`;
    requestAnimationFrame(animateStars);
}
animateStars();
/* 🃏 扇形布局（往下移动） */
const cards = document.querySelectorAll(".card");
function layoutCards() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.8; // ⭐ 关键：往下移动
    const radius = 260;
    const spread = 60;
    const start = -spread / 2;
    const step = spread / (cards.length - 1);
    cards.forEach((card, i) => {
        const angle = start + step * i;
        const rad = angle * Math.PI / 180;
        const x = cx + Math.sin(rad) * radius - 100;
        const y = cy - Math.cos(rad) * radius - 100;
        card.style.left = x + "px";
        card.style.top = y + "px";
        card.style.transform = `rotate(${angle}deg)`;
    });
}
layoutCards();
window.addEventListener("resize", layoutCards);
/* 🌟 光标拖尾（你给的版本） */
const cursor = document.getElementById("cursor");
let trails = [];
const trailCount = 10;
for (let i = 0; i < trailCount; i++) {
    let t = document.createElement("div");
    t.className = "trail";
    document.body.appendChild(t);
    trails.push({ el: t, x: 0, y: 0 });
}
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
    trails[0].x = e.clientX;
    trails[0].y = e.clientY;
});
function animateCursor() {
    for (let i = trails.length - 1; i > 0; i--) {
        trails[i].x += (trails[i-1].x - trails[i].x) * 0.5;
        trails[i].y += (trails[i-1].y - trails[i].y) * 0.5;
    }
    trails.forEach((t, i) => {
        let scale = 1 - i / trailCount;
        let opacity = 1 - i / trailCount;
        t.el.style.width = 10 * scale + "px";
        t.el.style.height = 10 * scale + "px";
        t.el.style.opacity = opacity;
        t.el.style.left = t.x + "px";
        t.el.style.top = t.y + "px";
    });
    requestAnimationFrame(animateCursor);
}
animateCursor();
/* 🃏 点击卡片 */
const showLayer = document.getElementById("showLayer");
const showImg = document.getElementById("showImg");
const showText = document.getElementById("showText");
cards.forEach(card => {
    card.addEventListener("click", e => {
        e.stopPropagation();
        showImg.src = card.querySelector("img").src;
        showText.innerText = card.dataset.text;
        showLayer.style.display = "flex";
        card.style.opacity = 0;
    });
});
showLayer.addEventListener("click", () => {
    showLayer.style.display = "none";
    cards.forEach(c => c.style.opacity = 1);
});
/* 新增：HOME按钮跳转方法 与第一个代码同款 */
function goHome() {
    window.location.href = "HOME.html";
}
</script>
</body>
</html>
